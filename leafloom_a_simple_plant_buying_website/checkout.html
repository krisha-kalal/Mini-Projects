<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Secure Checkout | Leafloom</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            -webkit-font-smoothing: antialiased;
            font-family: 'Poppins', serif;
        }
        :root {
            --primary-color: #43a047;
            --primary-hover: #2e7d32;
            --accent-bg: #f3f6f5;
            --text-dark: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #8c8c8c;
            --border-subtle: #eaeaea;
            --focus-ring: rgba(17, 51, 65, 0.1);
        }
        body {
            color: var(--text-dark);
            background-color: #ffffff;
            line-height: 1.5;
            min-height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            border-bottom: 1px solid var(--border-subtle);
            background: #ffffff;
        }
        .logo {
            font-family: 'Ayaha';
            font-size: 35px;
            color: #1f5422;
        }
        .secure-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .secure-badge svg { color: #2e7d32; }
        .checkout-wrapper {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 60px;
            align-items: start;
        }
        .checkout-form-section {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }
        .form-block-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-block-title span {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-bg);
            color: var(--primary-color);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 13px;
        }
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .full-width { grid-column: 1 / -1; }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            color: var(--text-dark);
        }
        .input-field:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }
        .payment-tabs-nav {
            display: flex;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .payment-tab-trigger {
            flex: 1;
            padding: 14px;
            background: #fdfdfd;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            text-align: center;
        }
        .payment-tab-trigger:not(:last-child) {
            border-right: 1px solid var(--border-subtle);
        }
        .payment-tab-trigger.active {
            background: var(--accent-bg);
            color: var(--primary-color);
            font-weight: 600;
        }
        .payment-pane {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .payment-pane.active { display: block; }
        .order-review-card {
            background: var(--accent-bg);
            border-radius: 16px;
            padding: 30px;
            position: sticky;
            top: 40px;
        }
        .review-title {
            font-size: 18px;
            font-weight: 600;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8e6;
            margin-bottom: 20px;
        }
        .review-manifest-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 240px;
            overflow-y: auto;
            margin-bottom: 25px;
            padding-right: 5px;
        }
        .review-manifest-list::-webkit-scrollbar { width: 4px; }
        .review-manifest-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .manifest-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
        }
        .manifest-item-info {
            display: flex;
            flex-direction: column;
        }
        .manifest-item-name { font-weight: 500; color: var(--text-dark); }
        .manifest-item-qty { font-size: 12px; color: var(--text-muted); }
        .manifest-item-price { font-weight: 600; color: var(--text-dark); }
        .price-breakdown-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .grand-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            margin-top: 20px;
            border-top: 1px solid #e2e8e6;
            padding-top: 20px;
            margin-bottom: 25px;
        }
        .complete-order-btn {
            width: 100%;
            background: var(--primary-color);
            color: #ffffff;
            border: none;
            height: 45px;
            font-family: 'Poppins', serif;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(17, 51, 41, 0.15);
        }
        .complete-order-btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 6px 18px rgba(17, 51, 41, 0.2);
        }
        .breadcrumb {
            padding: 20px 93px;
            gap: 20px;
            margin-bottom: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 992px) {
            .checkout-wrapper { grid-template-columns: 1fr; gap: 40px; }
            .order-review-card { position: relative; top: 0; }
        }
        @media (max-width: 600px) {
            .checkout-wrapper { padding: 0 20px; }
            .input-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <a class="logo">Leafloom</a>
        <div class="secure-badge">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12c5.16-1.26 9-6.45 9-12V5l-9-4zm-2 15l-4-4l1.41-1.41L10 13.17l7.59-7.59L19 7l-9 9z"/>
            </svg>
            <span>256-Bit SSL Encryption</span>
        </div>
    </header>
    <main class="checkout-wrapper">
        <section class="checkout-form-section">
            <form id="masterCheckoutForm" onsubmit="executeOrderFinalization(event)">
                <div style="margin-bottom: 40px;">
                    <h2 class="form-block-title"><span>1</span> Shipping Information</h2>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" class="input-field" required placeholder="John">
                        </div>
                        <div class="input-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" class="input-field" required placeholder="Doe">
                        </div>
                        <div class="input-group full-width">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" class="input-field" required placeholder="john.doe@example.com">
                        </div>
                        <div class="input-group full-width">
                            <label for="address">Street Address</label>
                            <input type="text" id="address" class="input-field" required placeholder="Apartment, Suite, Block, House No.">
                        </div>
                        <div class="input-group">
                            <label for="city">City</label>
                            <input type="text" id="city" class="input-field" required placeholder="Ahmedabad">
                        </div>
                        <div class="input-group">
                            <label for="zipcode">PIN Code / ZIP</label>
                            <input type="text" id="zipcode" class="input-field" required placeholder="380001" pattern="[0-9]{5,6}">
                        </div>
                    </div>
                </div>
                <div>
                    <h2 class="form-block-title"><span>2</span> Payment Method</h2>
                    <div class="payment-tabs-nav">
                        <button type="button" class="payment-tab-trigger active" onclick="switchPaymentPane(event, 'card-pane')">Credit / Debit Card</button>
                        <button type="button" class="payment-tab-trigger" onclick="switchPaymentPane(event, 'upi-pane')">UPI / NetBanking</button>
                    </div>
                    <div id="card-pane" class="payment-pane active">
                        <div class="input-grid">
                            <div class="input-group full-width">
                                <label for="cardNum">Card Number</label>
                                <input type="text" id="cardNum" class="input-field card-input-node" placeholder="4111 2222 3333 4444" pattern="[0-9 ]{12,19}">
                            </div>
                            <div class="input-group full-width">
                                <label for="cardName">Name On Card</label>
                                <input type="text" id="cardName" class="input-field card-input-node" placeholder="John Doe">
                            </div>
                            <div class="input-group">
                                <label for="cardExpiry">Expiry Date</label>
                                <input type="text" id="cardExpiry" class="input-field card-input-node" placeholder="MM/YY" pattern="(0[1-9]|1[0-2])\/[0-9]{2}">
                            </div>
                            <div class="input-group">
                                <label for="cardCvv">CVV Code</label>
                                <input type="password" id="cardCvv" class="input-field card-input-node" placeholder="•••" pattern="[0-9]{3,4}">
                            </div>
                        </div>
                    </div>
                    <div id="upi-pane" class="payment-pane">
                        <div class="input-grid">
                            <div class="input-group full-width">
                                <label for="upiId">UPI Virtual ID Address</label>
                                <input type="text" id="upiId" class="input-field upi-input-node" placeholder="username@oksbi">
                            </div>
                        </div>
                        <p style="font-size: 13px; color: var(--text-secondary); margin-top: 15px; background: #f8faf9; padding: 12px; border-radius: 6px; border-left: 3px solid var(--primary-color);">
                            A payment notification collect request will be pushed instantly to your mobile banking application platform wrapper.
                        </p>
                    </div>

                </div>
            </form>
        </section>
        <aside class="order-review-card">
            <h3 class="review-title">Review Your Order</h3>
            <div class="review-manifest-list" id="manifestListTarget">
            </div>
            <div class="price-breakdown-row">
                <span>Items Subtotal</span>
                <span id="reviewSubtotal">₹0</span>
            </div>
            <div class="price-breakdown-row">
                <span>Shipping & Handling</span>
                <span style="color: #2e7d32; font-weight: 500;">FREE</span>
            </div>
            <div class="price-breakdown-row">
                <span>Integrated GST (18%)</span>
                <span id="reviewTax">₹0</span>
            </div>
            
            <div class="grand-total-row">
                <span>Grand Total</span>
                <span id="reviewGrandTotal">₹0</span>
            </div>
            <button type="submit" form="masterCheckoutForm" class="complete-order-btn">Authorize Secure Payment</button>
        </aside>

    </main>
    <script src="script.js"></script>
</body>
</html>
